{% extends "base.html" %}
{% block title %}Criar conta - BuscaDOU{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto pt-16">
  <h1 class="text-2xl font-bold text-gray-900 mb-1">Criar conta</h1>
  <p class="text-sm text-gray-400 mb-8">Cadastre-se para gerar suas API keys.</p>

  {% if error %}
  <div class="bg-red-50 border border-red-100 text-red-600 text-sm rounded-xl px-4 py-3 mb-6 fade-in" role="alert">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/auth/signup" class="space-y-4">
    <div>
      <label for="signup-name" class="block text-sm font-medium text-gray-700 mb-1.5">Nome</label>
      <input type="text" name="name" id="signup-name" required autocomplete="name"
             class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm focus:outline-none focus:shadow-md focus:border-brand-light/30 transition-all duration-150"
             placeholder="Seu nome">
    </div>
    <div>
      <label for="signup-email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
      <input type="email" name="email" id="signup-email" required autocomplete="email"
             class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm focus:outline-none focus:shadow-md focus:border-brand-light/30 transition-all duration-150"
             placeholder="seu@email.com">
    </div>
    <div>
      <label for="signup-password" class="block text-sm font-medium text-gray-700 mb-1.5">Senha</label>
      <input type="password" name="password" id="signup-password" required minlength="8" autocomplete="new-password"
             class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm focus:outline-none focus:shadow-md focus:border-brand-light/30 transition-all duration-150"
             placeholder="Minimo 8 caracteres">
    </div>
    <button type="submit"
            class="w-full bg-brand text-white rounded-xl py-3 text-sm font-medium hover:bg-brand-light active:scale-[0.98] transition-all duration-150 shadow-sm hover:shadow-md">
      Criar conta
    </button>
  </form>

  <p class="text-center text-sm text-gray-400 mt-6">
    Ja tem conta? <a href="/login" class="text-brand-light hover:text-brand font-medium transition-colors duration-150">Entrar</a>
  </p>
</div>
{% endblock %}
