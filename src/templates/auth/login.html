{% extends "base.html" %}
{% block title %}Entrar - BuscaDOU{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto pt-16">
  <h1 class="text-2xl font-bold text-gray-900 mb-1">Entrar</h1>
  <p class="text-sm text-gray-400 mb-8">Acesse sua conta para gerenciar API keys.</p>

  {% if error %}
  <div class="bg-red-50 border border-red-100 text-red-600 text-sm rounded-xl px-4 py-3 mb-6 fade-in" role="alert">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/auth/login" class="space-y-4">
    <div>
      <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
      <input type="email" name="email" id="login-email" required autocomplete="email"
             class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm focus:outline-none focus:shadow-md focus:border-brand-light/30 transition-all duration-150"
             placeholder="seu@email.com">
    </div>
    <div>
      <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1.5">Senha</label>
      <input type="password" name="password" id="login-password" required autocomplete="current-password"
             class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm focus:outline-none focus:shadow-md focus:border-brand-light/30 transition-all duration-150"
             placeholder="Sua senha">
    </div>
    <button type="submit"
            class="w-full bg-brand text-white rounded-xl py-3 text-sm font-medium hover:bg-brand-light active:scale-[0.98] transition-all duration-150 shadow-sm hover:shadow-md">
      Entrar
    </button>
  </form>

  <p class="text-center text-sm text-gray-400 mt-6">
    Nao tem conta? <a href="/signup" class="text-brand-light hover:text-brand font-medium transition-colors duration-150">Criar conta</a>
  </p>
</div>
{% endblock %}
