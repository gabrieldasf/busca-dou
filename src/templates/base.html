<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BuscaDOU{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    mark { background: #fef3c7; padding: 0 2px; border-radius: 2px; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request .htmx-hide-on-request { opacity: 0.5; pointer-events: none; }
    input:focus { box-shadow: 0 0 0 3px rgba(59, 108, 245, 0.1); }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#0f1f52', light: '#3b6cf5' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#fafafa] text-gray-900 min-h-screen">
  <header class="bg-white border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-lg font-semibold tracking-tight text-gray-900">BuscaDOU</a>
      <nav class="text-sm flex gap-4">
        <a href="/" class="text-gray-400 hover:text-gray-900 transition-colors duration-150">Busca</a>
        <a href="/docs" class="text-gray-400 hover:text-gray-900 transition-colors duration-150">API Docs</a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-gray-100 mt-16">
    <div class="max-w-3xl mx-auto px-4 py-6 text-center text-xs text-gray-400">
      BuscaDOU - Diarios Oficiais
    </div>
  </footer>
</body>
</html>
