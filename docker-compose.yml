services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BUSCADOU_DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/buscadou
      - BUSCADOU_REDIS_URL=redis://redis:6379
      - BUSCADOU_ENVIRONMENT=development
      - BUSCADOU_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/app/src

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=buscadou
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
